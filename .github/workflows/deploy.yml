name: Deployment

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}

            echo "Pulling latest code..."
            git pull origin main

            echo "Building Docker image..."
            docker build -t something-webapp .

            echo "Restarting container..."
            docker stop something-webapp 2>/dev/null || true
            docker rm something-webapp 2>/dev/null || true

            docker run -d \
              --name something-webapp \
              --restart unless-stopped \
              -p 3009:3000 \
              -v ${{ secrets.APP_DIR }}/data:/app/data \
              something-webapp

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Done. Container is up on port 3009."
